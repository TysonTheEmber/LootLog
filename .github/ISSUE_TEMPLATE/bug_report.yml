name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mod Version
      description: Which version of the mod are you using?
    validations:
      required: true
  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft Version
    validations:
      required: true
  - type: input
    id: logs
    attributes:
      label: Logs
      description: Upload your latest.log to [mclo.gs](https://mclo.gs) and paste the link here.
      placeholder: https://mclo.gs/...
    validations:
      required: true
  - type: textarea
    id: modlist
    attributes:
      label: Mod List
      description: List any other mods you have installed that may be relevant, and the modpack if you are using one
      render: text
    validations:
      required: false