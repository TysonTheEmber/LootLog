plugins {
    id 'fabric-loom' version '1.11.8'
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

base {
    archivesName = "${mod_id}-fabric-1.21.1"
}

sourceSets {
    main {
        java {
            srcDir project(':common').file('src/config/java')
        }
        resources {
            srcDir project(':common').file('src/main/resources')
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${mc_1211}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_1211}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_1211}"
    implementation project(':common')

    // EmbersTextAPI - soft dependency for text effect integration
    modCompileOnly "net.tysontheember.emberstextapi:emberstextapi-fabric-1.21.1:2.9.1"
    modLocalRuntime "net.tysontheember.emberstextapi:emberstextapi-fabric-1.21.1:2.9.1"

    // YACL - optional config GUI
    modCompileOnly "dev.isxander:yet-another-config-lib:${yacl_version_1211}-fabric"
    modLocalRuntime "dev.isxander:yet-another-config-lib:${yacl_version_1211}-fabric"

    // ModMenu - optional config screen integration
    modCompileOnly "com.terraformersmc:modmenu:${modmenu_version_1211}"
    modLocalRuntime "com.terraformersmc:modmenu:${modmenu_version_1211}"
}

tasks.named('jar', Jar).configure {
    from(project(':common').sourceSets.main.output)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
        mod_id               : mod_id,
        mod_name             : mod_name,
        mod_version          : mod_version,
        mod_description      : mod_description,
        minecraft_version    : mc_1211,
        fabric_loader_version: fabric_loader_1211,
    ]

    inputs.properties replaceProperties

    filesMatching('fabric.mod.json') {
        expand replaceProperties
    }
}
